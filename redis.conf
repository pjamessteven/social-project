# Disable disk persistence - run in pure memory mode
# save commands are not set, so no RDB snapshots will be created
save ""

# Disable AOF (Append Only File) persistence
appendonly no

# Memory settings
maxmemory 1536mb
maxmemory-policy allkeys-lru

# Ensure data is stored inside the /data mount
# Note: This is irrelevant without persistence, but kept for compatibility
dir /data
